name: Claude Review - Phase 3 (Draft PR Creation)

# Phase 3: Full pipeline with automated draft PR creation
# Creates draft PRs with AI-suggested fixes (requires human approval to merge)
# CRITICAL: Never auto-merges, always requires maintainer review
# Estimated cost: $3-8/PR depending on consensus + patch generation

on:
  pull_request:
    types: [opened, ready_for_review, labeled]

# Cost control: Only allow one workflow per PR at a time
concurrency:
  group: claude-full-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-check:
    name: Pre-flight Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      safe_to_proceed: ${{ steps.check.outputs.safe }}
      blocked_reason: ${{ steps.check.outputs.reason }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Security validation
        id: check
        run: |
          SAFE="true"
          REASON=""

          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # CRITICAL: Block modifications to sensitive paths
          BLOCKED_PATTERNS=(
            ".github/workflows/"
            ".github/actions/"
            "secrets/"
            ".env"
            ".env.*"
            "*.key"
            "*.pem"
            "credentials"
            "CLAUDE.md"
          )

          for pattern in "${BLOCKED_PATTERNS[@]}"; do
            if echo "$CHANGED_FILES" | grep -E "$pattern" > /dev/null; then
              SAFE="false"
              REASON="Modifications to protected files detected: $pattern. AI patch generation not allowed."
              break
            fi
          done

          # Check for fork PRs (security risk)
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            SAFE="false"
            REASON="PR from fork - AI patch generation disabled for security"
          fi

          echo "safe=$SAFE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

          if [ "$SAFE" == "false" ]; then
            echo "::error::$REASON"
          fi

  claude-review:
    name: Claude Code Review + Patch Generation
    needs: security-check
    if: |
      needs.security-check.outputs.safe_to_proceed == 'true' &&
      contains(github.event.pull_request.labels.*.name, 'ai-patch') &&
      github.actor != 'claude[bot]' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BEDROCK_CONFIGURED: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK != '' }}
      ANTHROPIC_KEY_SET: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    outputs:
      has_suggestions: ${{ steps.parse.outputs.has_suggestions }}
      patch_file: ${{ steps.parse.outputs.patch_file }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      # ========== PRIMARY: AWS Bedrock ==========
      - name: Claude Review (Bedrock - Primary)
        id: bedrock
        if: env.BEDROCK_CONFIGURED == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          use_bedrock: "true"
          timeout_minutes: 15
          claude_args: >-
            --allowed-tools
            "Bash(git diff *),Bash(git log *),Read,Edit,Write"
            --max-turns 25
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          CLAUDE_CODE_USE_BEDROCK: "1"

      # ========== FALLBACK: Anthropic Direct API ==========
      - name: Claude Review (Anthropic - Fallback)
        id: anthropic
        if: |
          env.ANTHROPIC_KEY_SET == 'true' &&
          (env.BEDROCK_CONFIGURED != 'true' || steps.bedrock.outcome != 'success')
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          timeout_minutes: 15
          claude_args: >-
            --allowed-tools
            "Bash(git diff *),Bash(git log *),Read,Edit,Write"
            --max-turns 25

      - name: Parse review results
        id: parse
        run: |
          if git diff --quiet; then
            echo "has_suggestions=false" >> $GITHUB_OUTPUT
            echo "::notice::No code changes suggested by AI review"
          else
            echo "has_suggestions=true" >> $GITHUB_OUTPUT

            git diff > /tmp/ai-suggestions.patch

            if git apply --check /tmp/ai-suggestions.patch 2>&1; then
              echo "patch_file=/tmp/ai-suggestions.patch" >> $GITHUB_OUTPUT
              echo "::notice::Valid patch generated - $(git diff --stat | tail -1)"
            else
              echo "has_suggestions=false" >> $GITHUB_OUTPUT
              echo "::error::Generated patch cannot be cleanly applied"
            fi
          fi

      - name: Upload patch artifact
        if: steps.parse.outputs.has_suggestions == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ai-suggestions-patch
          path: /tmp/ai-suggestions.patch
          retention-days: 7

  pal-consensus-validation:
    name: Validate Suggestions with Multi-Model Consensus
    needs: [security-check, claude-review]
    if: needs.claude-review.outputs.has_suggestions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      consensus_approve: ${{ steps.consensus.outputs.approved }}
      consensus_reason: ${{ steps.consensus.outputs.reason }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download patch
        uses: actions/download-artifact@v4
        with:
          name: ai-suggestions-patch
          path: /tmp/

      - name: Prepare patch context
        run: |
          git apply --stat /tmp/ai-suggestions.patch > /tmp/patch-summary.txt

      - name: Run consensus on suggested changes
        id: consensus
        env:
          PAL_MCP_API_KEY: ${{ secrets.PAL_MCP_API_KEY }}
          PAL_MCP_ENDPOINT: ${{ secrets.PAL_MCP_ENDPOINT || 'https://pal-mcp.example.com/api/tools/consensus' }}
        run: |
          if [ -z "$PAL_MCP_API_KEY" ]; then
            echo "::warning::PAL_MCP_API_KEY not set — skipping consensus, auto-approving"
            echo "approved=true" >> $GITHUB_OUTPUT
            echo "reason=Consensus skipped (PAL_MCP_API_KEY not configured)" >> $GITHUB_OUTPUT
            exit 0
          fi

          PATCH_CONTENT=$(cat /tmp/ai-suggestions.patch | jq -R -s .)
          PATCH_SUMMARY=$(cat /tmp/patch-summary.txt)

          cat > /tmp/consensus-request.json <<EOF
          {
            "prompt": "Evaluate whether these AI-suggested code changes are safe to apply:\n\nPatch Summary:\n${PATCH_SUMMARY}\n\nFull Patch:\n${PATCH_CONTENT}\n\nAssess: 1) Correctness, 2) Security, 3) Code quality, 4) Risk of introducing bugs",
            "models": [
              {"model": "gpt-5-mini", "stance": "for"},
              {"model": "claude-haiku-4.5", "stance": "against"},
              {"model": "gemini-2-flash", "stance": "neutral"}
            ],
            "focus_areas": ["security", "correctness", "side-effects"],
            "temperature": 0.1,
            "thinking_mode": "high"
          }
          EOF

          RESPONSE=$(curl -s -X POST "$PAL_MCP_ENDPOINT" \
            -H "Authorization: Bearer $PAL_MCP_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/consensus-request.json)

          RECOMMENDATION=$(echo "$RESPONSE" | jq -r '.synthesized_recommendation')

          if echo "$RECOMMENDATION" | grep -iE "(safe|acceptable|approved|looks good)" > /dev/null; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

          echo "reason<<EOF" >> $GITHUB_OUTPUT
          echo "$RECOMMENDATION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-draft-pr:
    name: Create Draft PR with AI Suggestions
    needs: [security-check, claude-review, pal-consensus-validation]
    if: |
      needs.claude-review.outputs.has_suggestions == 'true' &&
      needs.pal-consensus-validation.outputs.consensus_approve == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Download patch
        uses: actions/download-artifact@v4
        with:
          name: ai-suggestions-patch
          path: /tmp/

      - name: Apply AI suggestions
        run: |
          git apply /tmp/ai-suggestions.patch

      - name: Run linters and formatters
        continue-on-error: true
        run: |
          if command -v ruff &> /dev/null; then
            ruff check . --fix
            ruff format .
          fi

      - name: Run secret scanning
        run: |
          if git diff | grep -iE "(api[_-]?key|password|secret|token)" > /dev/null; then
            echo "::warning::Potential secret detected in changes - manual review required"
          fi

      - name: Create Draft Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: |
            AI-suggested improvements from PR #${{ github.event.pull_request.number }}

            Generated by Claude Code Review + PAL MCP consensus validation.

            Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
          branch: ai/auto-fix-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          delete-branch: true
          draft: true
          title: "AI Suggestions: ${{ github.event.pull_request.title }}"
          body: |
            ## Automated Improvements

            This draft PR contains AI-suggested improvements for PR #${{ github.event.pull_request.number }}.

            ### Review Process

            1. **Claude Code Review**: Analyzed code and generated suggestions
            2. **PAL MCP Consensus**: Validated changes with 3 models (GPT-5-mini, Claude Haiku, Gemini-2-Flash)
            3. **Security Checks**: Passed pre-flight validation
            4. **Patch Application**: Applied cleanly

            ### Consensus Recommendation

            ${{ needs.pal-consensus-validation.outputs.consensus_reason }}

            ### Important

            - **This is a DRAFT PR** - requires human review before merge
            - **Do not auto-merge** - maintainer approval required
            - Review all changes carefully before approving
            - Run full CI/CD pipeline before merging

            ### Metrics

            - Original PR: #${{ github.event.pull_request.number }}
            - Models: Claude Opus 4.6, GPT-5-mini, Claude Haiku 4.5, Gemini-2-Flash
            - Estimated cost: ~$5-8
            - Phase: 3 (Draft PR Creation)

            ---
            Generated by [Claude Code](https://claude.com/claude-code) + [PAL MCP](https://github.com/BeehiveInnovations/pal-mcp-server)
          labels: |
            ai-generated
            needs-human-review
            draft
          reviewers: ${{ github.event.pull_request.user.login }}

      - name: Comment on original PR
        if: steps.create_pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = '${{ steps.create_pr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.create_pr.outputs.pull-request-url }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Suggestions Available

            I've analyzed this PR and created a draft PR with suggested improvements: **#${prNumber}**

            [View Draft PR with AI Suggestions](${prUrl})

            ### What's included

            - Multi-model consensus validation (3 models)
            - Security checks passed
            - Patch applied cleanly

            ### Next steps

            1. Review the suggested changes in draft PR #${prNumber}
            2. If approved, merge the draft PR
            3. That PR will auto-close when this PR is merged

            **The draft PR requires human approval** - do not auto-merge.

            ---
            Estimated cost: ~$5-8 | Phase 3: Draft PR Creation`
            });

      - name: Workflow summary
        if: always()
        run: |
          echo "### Draft PR Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Draft PR**: #${{ steps.create_pr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.create_pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Awaiting human review" >> $GITHUB_STEP_SUMMARY
          echo "- **Phase**: 3 (Draft PR Creation)" >> $GITHUB_STEP_SUMMARY

  blocked-security:
    name: Security Block Notice
    needs: security-check
    if: needs.security-check.outputs.safe_to_proceed == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Post security notice
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reason = `${{ needs.security-check.outputs.blocked_reason }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Patch Generation Blocked

            ${reason}

            **Security Policy**: Automated patch generation is disabled for:
            - Workflow files (.github/workflows/*)
            - Secrets and credentials
            - CLAUDE.md (manually maintained)
            - PRs from forks

            You can still get a review comment by using the AI Code Review workflow.`
            });

# Required secrets:
# - GITHUB_TOKEN (automatically provided)
# - PAT_TOKEN (Personal Access Token with repo scope, optional)
# - ANTHROPIC_API_KEY or AWS_BEARER_TOKEN_BEDROCK (at least one required)
# - PAL_MCP_API_KEY (optional - consensus skipped if missing)
# - PAL_MCP_ENDPOINT (optional - has default)
#
# SECURITY NOTES:
# - Never auto-merges (always creates DRAFT PRs)
# - Blocks sensitive file modifications (including CLAUDE.md)
# - Requires human approval
# - Runs secret scanning on generated patches
