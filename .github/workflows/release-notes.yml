name: AI Release Notes

# Generate AI-powered release notes on new releases
# Analyzes commits since last release and generates structured release notes

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to generate notes for (e.g. v7.1.0)"
        required: true
        type: string

# One release notes generation at a time
concurrency:
  group: release-notes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      BEDROCK_CONFIGURED: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK != '' }}
      ANTHROPIC_KEY_SET: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate API provider
        run: |
          if [ "${{ env.BEDROCK_CONFIGURED }}" != "true" ] && [ "${{ env.ANTHROPIC_KEY_SET }}" != "true" ]; then
            echo "::warning::No API provider configured - skipping AI release notes"
            exit 0
          fi

      - name: Get previous release tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "No previous tag found, using initial commit: $PREV_TAG"
          fi
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous release: $PREV_TAG"

      # ========== PRIMARY: AWS Bedrock ==========
      - name: Generate Notes (Bedrock - Primary)
        id: bedrock
        if: env.BEDROCK_CONFIGURED == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: "true"
          timeout_minutes: 10
          prompt: |
            Generate release notes for SuperClaude release ${{ env.RELEASE_TAG }}.

            ## Instructions

            1. Get the commit log since the previous release:
               `git log ${{ steps.prev_tag.outputs.prev_tag }}..${{ env.RELEASE_TAG }} --oneline --no-merges`

            2. Also check the full diff for a high-level understanding:
               `git diff --stat ${{ steps.prev_tag.outputs.prev_tag }}..${{ env.RELEASE_TAG }}`

            3. Categorize changes into these sections:
               - **New Features**: New functionality added
               - **Improvements**: Enhancements to existing features
               - **Bug Fixes**: Issues resolved
               - **Security**: Security-related changes
               - **CI/CD**: Pipeline and automation changes
               - **Documentation**: Doc updates
               - **Dependencies**: Dependency updates
               - **Breaking Changes**: Changes that may affect existing users

            4. Update the release body using:
               ```
               gh release edit ${{ env.RELEASE_TAG }} --notes "$(cat <<'NOTES'
               <your generated notes here>
               NOTES
               )"
               ```

            ## Format

            Use this format for the release notes:
            ```markdown
            ## What's Changed

            ### New Features
            - Feature description (#PR_NUMBER)

            ### Improvements
            - Improvement description (#PR_NUMBER)

            ### Bug Fixes
            - Fix description (#PR_NUMBER)

            [... other sections as applicable ...]

            ### Contributors
            - @username

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.prev_tag }}...${{ env.RELEASE_TAG }}
            ```

            Only include sections that have actual changes. Skip empty sections.
          claude_args: >-
            --allowed-tools
            "Bash(git log *),Bash(git diff *),Bash(gh release edit *),Bash(gh pr list *),Read,Glob,Grep"
            --max-turns 10
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          CLAUDE_CODE_USE_BEDROCK: "1"

      # ========== FALLBACK: Anthropic Direct API ==========
      - name: Generate Notes (Anthropic - Fallback)
        id: anthropic
        if: |
          env.ANTHROPIC_KEY_SET == 'true' &&
          (env.BEDROCK_CONFIGURED != 'true' || steps.bedrock.outcome != 'success')
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          timeout_minutes: 10
          prompt: |
            Generate release notes for SuperClaude release ${{ env.RELEASE_TAG }}.

            ## Instructions

            1. Get the commit log since the previous release:
               `git log ${{ steps.prev_tag.outputs.prev_tag }}..${{ env.RELEASE_TAG }} --oneline --no-merges`

            2. Also check the full diff for a high-level understanding:
               `git diff --stat ${{ steps.prev_tag.outputs.prev_tag }}..${{ env.RELEASE_TAG }}`

            3. Categorize changes into these sections:
               - **New Features**: New functionality added
               - **Improvements**: Enhancements to existing features
               - **Bug Fixes**: Issues resolved
               - **Security**: Security-related changes
               - **CI/CD**: Pipeline and automation changes
               - **Documentation**: Doc updates
               - **Dependencies**: Dependency updates
               - **Breaking Changes**: Changes that may affect existing users

            4. Update the release body using:
               ```
               gh release edit ${{ env.RELEASE_TAG }} --notes "$(cat <<'NOTES'
               <your generated notes here>
               NOTES
               )"
               ```

            ## Format

            Use this format for the release notes:
            ```markdown
            ## What's Changed

            ### New Features
            - Feature description (#PR_NUMBER)

            ### Improvements
            - Improvement description (#PR_NUMBER)

            ### Bug Fixes
            - Fix description (#PR_NUMBER)

            [... other sections as applicable ...]

            ### Contributors
            - @username

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.prev_tag.outputs.prev_tag }}...${{ env.RELEASE_TAG }}
            ```

            Only include sections that have actual changes. Skip empty sections.
          claude_args: >-
            --allowed-tools
            "Bash(git log *),Bash(git diff *),Bash(gh release edit *),Bash(gh pr list *),Read,Glob,Grep"
            --max-turns 10
