# SuperClaude Security Scanning Pipeline
# CodeQL analysis + dependency auditing

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly security scan - Mondays at midnight UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ============================================
  # CodeQL - Static Application Security Testing
  # ============================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on forks/repos without Code Security enabled (requires paid feature)
    if: github.repository == 'Tony363/SuperClaude'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ============================================
  # Dependency Audit - Check for vulnerable packages
  # ============================================
  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install ".[dev]"

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit --desc on --format markdown --output audit-report.md
          cat audit-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: audit-report.md
          retention-days: 30

  # ============================================
  # Bandit - Python Security Linter
  # ============================================
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        continue-on-error: true
        run: |
          bandit -c pyproject.toml -r SuperClaude/ -f json -o bandit-report.json
          bandit -c pyproject.toml -r SuperClaude/ -f txt

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ============================================
  # Security Summary
  # ============================================
  security-summary:
    name: Security Summary
    if: always()
    needs: [codeql, pip-audit, bandit]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit | ${{ needs.pip-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | ${{ needs.bandit.result }} |" >> $GITHUB_STEP_SUMMARY
