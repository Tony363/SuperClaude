# SuperClaude Nightly Code Review & Improvement Workflow
# Proactive code quality monitoring with multi-model consensus
# Phase 3: Deterministic autofix + LLM-generated single-file fixes

name: Nightly Code Review

on:
  schedule:
    # Run at 2 AM UTC daily
    - cron: '0 2 * * *'
    # Alternative: Weekdays only
    # - cron: '0 2 * * 1-5'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview mode (no PRs created)'
        required: false
        type: boolean
        default: false
      enable_autofix:
        description: 'Enable Phase 2 autofix (ruff format only)'
        required: false
        type: boolean
        default: true
      scope:
        description: 'Scope selection'
        required: false
        type: choice
        options:
          - last-24h
          - high-risk-dirs
          - all
        default: last-24h
      categories:
        description: 'Review categories (comma-separated)'
        required: false
        type: string
        default: 'security,quality,performance,tests'
      models:
        description: 'PAL MCP models (comma-separated)'
        required: false
        type: string
        default: 'gpt-5.2,gemini-3-pro'
      max_files:
        description: 'Max files per run'
        required: false
        type: number
        default: 50
      max_loc:
        description: 'Max lines of code per run'
        required: false
        type: number
        default: 5000
      max_prs:
        description: 'Max PRs per run'
        required: false
        type: number
        default: 4
      stale_days:
        description: 'Days before closing stale PRs'
        required: false
        type: number
        default: 7
      max_llm_fixes:
        description: 'Max LLM-generated fix PRs per run (Phase 3)'
        required: false
        type: number
        default: 5

# Only one nightly review can run at a time
concurrency:
  group: nightly-review-${{ github.ref }}
  cancel-in-progress: true

env:
  # Cost control: Budget guardrails (overridable via workflow_dispatch inputs)
  MAX_FILES_PER_RUN: ${{ github.event.inputs.max_files || 50 }}
  MAX_LOC_PER_RUN: ${{ github.event.inputs.max_loc || 5000 }}
  MAX_PRS_PER_RUN: ${{ github.event.inputs.max_prs || 4 }}
  PR_STALE_DAYS: ${{ github.event.inputs.stale_days || 7 }}

  # Workflow configuration
  PYTHON_VERSION: '3.11'
  WORKFLOW_TIMEOUT_MINUTES: 30

jobs:
  nightly-review:
    name: Multi-Model Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      issues: read
      checks: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for change detection

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pydantic pyyaml gitpython

      - name: Check for recent changes (skip logic)
        id: check_changes
        run: |
          SCOPE="${{ github.event.inputs.scope || 'last-24h' }}"

          # Skip this check if manually triggered with broader scope
          if [[ "$SCOPE" == "all" ]] || [[ "$SCOPE" == "high-risk-dirs" ]]; then
            echo "Manual trigger with scope=$SCOPE - bypassing change check"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get last successful workflow run
          LAST_RUN=$(gh run list \
            --workflow=nightly-review.yml \
            --status=success \
            --limit=1 \
            --json createdAt \
            --jq '.[0].createdAt' || echo "")

          if [[ -z "$LAST_RUN" ]]; then
            echo "First run - proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any commits since last successful run
          COMMITS_SINCE=$(git log --since="$LAST_RUN" --oneline | wc -l)

          if [[ $COMMITS_SINCE -eq 0 ]]; then
            echo "No commits since last successful run - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=no_changes" >> $GITHUB_OUTPUT
          else
            echo "Found $COMMITS_SINCE commits since last run - proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine scope
        id: scope
        if: steps.check_changes.outputs.skip != 'true'
        run: |
          SCOPE="${{ github.event.inputs.scope || 'last-24h' }}"
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "Selected scope: $SCOPE"

      - name: Run scope selector
        id: scope_selector
        if: steps.check_changes.outputs.skip != 'true'
        run: |
          python scripts/scope_selector.py \
            --scope "${{ steps.scope.outputs.scope }}" \
            --max-files "${{ env.MAX_FILES_PER_RUN }}" \
            --max-loc "${{ env.MAX_LOC_PER_RUN }}" \
            --output scope-selection.json

          # Check if any files to review
          FILE_COUNT=$(jq '.files | length' scope-selection.json)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

          if [[ $FILE_COUNT -eq 0 ]]; then
            echo "No files to review - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Found $FILE_COUNT files to review"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload scope selection
        if: steps.scope_selector.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: scope-selection
          path: scope-selection.json
          retention-days: 30

      # ========== Pre-LLM: Deterministic Fixes ==========
      # Run ruff format + lint fixes BEFORE LLM review to save API tokens.
      # The LLM should focus on complex issues (security, performance, logic).

      - name: Apply deterministic fixes (pre-LLM)
        id: deterministic_fixes
        if: steps.scope_selector.outputs.skip != 'true'
        run: |
          # Get list of Python files from scope selection
          SCOPE_FILES=$(jq -r '.files[].path' scope-selection.json | grep '\.py$' || true)

          if [[ -z "$SCOPE_FILES" ]]; then
            echo "No Python files in scope - skipping deterministic fixes"
            echo "fixes_applied=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          pip install ruff

          FIXED_FILES=0
          for file in $SCOPE_FILES; do
            if [[ -f "$file" ]]; then
              # Format
              ruff format "$file" 2>/dev/null || true
              # Fix unused imports and import sorting
              ruff check --select F401,I001 --fix "$file" 2>/dev/null || true

              # Check if file was modified
              if ! git diff --quiet -- "$file" 2>/dev/null; then
                FIXED_FILES=$((FIXED_FILES + 1))
              fi
            fi
          done

          echo "deterministic_fixed_count=$FIXED_FILES" >> $GITHUB_OUTPUT

          if [[ $FIXED_FILES -gt 0 ]]; then
            echo "fixes_applied=true" >> $GITHUB_OUTPUT
            echo "Applied deterministic fixes to $FIXED_FILES files"
            git add -A
          else
            echo "fixes_applied=false" >> $GITHUB_OUTPUT
            echo "No deterministic fixes needed"
          fi

      - name: Check API provider configuration
        id: check_providers
        if: steps.scope_selector.outputs.skip != 'true'
        run: |
          BEDROCK_CONFIGURED="${{ secrets.AWS_BEARER_TOKEN_BEDROCK != '' }}"
          ANTHROPIC_CONFIGURED="${{ secrets.ANTHROPIC_API_KEY != '' }}"

          echo "bedrock_available=$BEDROCK_CONFIGURED" >> $GITHUB_OUTPUT
          echo "anthropic_available=$ANTHROPIC_CONFIGURED" >> $GITHUB_OUTPUT

          if [[ "$BEDROCK_CONFIGURED" != "true" ]] && [[ "$ANTHROPIC_CONFIGURED" != "true" ]]; then
            echo "::error::No Claude API provider configured (AWS Bedrock or Anthropic API)"
            exit 1
          fi

      - name: Run PAL MCP consensus review (AWS Bedrock)
        id: consensus_review_bedrock
        if: |
          steps.scope_selector.outputs.skip != 'true' &&
          steps.check_providers.outputs.bedrock_available == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        # MCP provider may be unavailable -- suggestion PR is still generated from cached findings
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: "true"
          show_full_output: false
          prompt: |
            # Nightly Code Review - PAL MCP Consensus Analysis

            You are performing a proactive nightly code review using PAL MCP multi-model consensus.

            ## Task

            1. **Read scope-selection.json** - Contains the list of files to review with metadata
            2. **Review each file** using PAL MCP consensus (models: ${{ github.event.inputs.models || 'gpt-5.2,gemini-3-pro' }})
            3. **Generate findings** for categories: ${{ github.event.inputs.categories || 'security,quality,performance,tests' }}
            4. **Write findings to review-findings.json** in the exact schema specified below

            ## Important: Skip Deterministic Issues

            Formatting and basic lint issues (unused imports, import sorting) have
            already been fixed by automated tools. Do NOT report findings for:
            - Code formatting (ruff format handles this)
            - Unused imports (F401 - already fixed)
            - Import sorting (I001 - already fixed)

            Focus your review on issues that require human judgment:
            security, architecture, performance, logic errors, and test coverage.

            ## PAL MCP Consensus Instructions

            For EACH file in scope-selection.json, use the `mcp__pal__consensus` tool to get multi-model analysis.

            ## Finding Schema (STRICT)

            Each finding MUST match this exact schema:

            ```json
            {
              "category": "security|quality|performance|tests",
              "severity": "critical|high|medium|low",
              "file": "relative/path/to/file.py",
              "line_start": 42,
              "line_end": 45,
              "issue": "Clear description of the issue",
              "suggestion": "Specific, actionable fix recommendation",
              "confidence": 0.85,
              "actionable": true,
              "fix_type": "optional: ruff_format|ruff_lint_fix or omit"
            }
            ```

            ## Review Focus Areas

            1. **Security**: Vulnerabilities, secrets, injection risks, auth/authz issues, input validation
            2. **Quality**: SOLID violations, code smells, complexity (KISS), maintainability, readability
            3. **Performance**: Algorithmic efficiency, N+1 queries, unnecessary operations, resource usage
            4. **Tests**: Missing coverage, test quality, edge cases, integration test gaps

            ## Severity Guidelines

            - **critical**: Security vulnerabilities, data loss risks, production-breaking bugs
            - **high**: Major design issues, significant performance problems, missing auth checks
            - **medium**: Code quality issues, maintainability concerns, minor performance issues
            - **low**: Style issues, minor improvements, optional optimizations

            ## Confidence Guidelines

            - **0.9-1.0**: Definitely an issue (e.g., SQL injection, hardcoded secrets)
            - **0.7-0.9**: Likely an issue (e.g., complex function, missing tests)
            - **0.5-0.7**: Possible issue (e.g., potential performance bottleneck)
            - **< 0.7**: Filter out (too uncertain)

            ## Output Format

            Write `review-findings.json` with this structure:

            ```json
            {
              "findings": [
                {
                  "category": "security",
                  "severity": "high",
                  "file": "src/auth.py",
                  "line_start": 23,
                  "line_end": 25,
                  "issue": "Hardcoded secret key in source code",
                  "suggestion": "Move secret key to environment variable and load via os.getenv('SECRET_KEY')",
                  "confidence": 0.95,
                  "actionable": true
                }
              ],
              "summary": {
                "total": 1,
                "by_category": {
                  "security": 1,
                  "quality": 0,
                  "performance": 0,
                  "tests": 0
                },
                "models_used": ["gpt-5.2", "gemini-3-pro"],
                "categories_requested": ["security", "quality", "performance", "tests"]
              }
            }
            ```

            ## Critical Requirements

            - Use `mcp__pal__consensus` for multi-model validation
            - Filter findings: confidence >= 0.7 AND actionable = true
            - Deduplicate: Remove findings with same file + line_start + line_end
            - Validate schema: All required fields present, correct types
            - Write to `review-findings.json` in the current directory

            ## Error Handling

            If PAL MCP consensus fails for a file:
            - Log the error to stderr
            - Continue with remaining files (failure isolation)
            - Include successful findings in output

            Begin now. Read scope-selection.json and perform the consensus review.

      - name: Run PAL MCP consensus review (Anthropic API Fallback)
        id: consensus_review_anthropic
        if: |
          steps.scope_selector.outputs.skip != 'true' &&
          steps.consensus_review_bedrock.outcome != 'success' &&
          steps.check_providers.outputs.anthropic_available == 'true'
        uses: anthropics/claude-code-action@v1
        # MCP provider may be unavailable -- suggestion PR is still generated from cached findings
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: "false"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: false
          prompt: |
            # Nightly Code Review - PAL MCP Consensus Analysis

            You are performing a proactive nightly code review using PAL MCP multi-model consensus.

            ## Task

            1. **Read scope-selection.json** - Contains the list of files to review with metadata
            2. **Review each file** using PAL MCP consensus (models: ${{ github.event.inputs.models || 'gpt-5.2,gemini-3-pro' }})
            3. **Generate findings** for categories: ${{ github.event.inputs.categories || 'security,quality,performance,tests' }}
            4. **Write findings to review-findings.json** in the exact schema specified below

            ## Important: Skip Deterministic Issues

            Formatting and basic lint issues (unused imports, import sorting) have
            already been fixed by automated tools. Do NOT report findings for:
            - Code formatting (ruff format handles this)
            - Unused imports (F401 - already fixed)
            - Import sorting (I001 - already fixed)

            Focus your review on issues that require human judgment:
            security, architecture, performance, logic errors, and test coverage.

            ## PAL MCP Consensus Instructions

            For EACH file in scope-selection.json, use the `mcp__pal__consensus` tool to get multi-model analysis.

            ## Finding Schema (STRICT)

            Each finding MUST match this exact schema:

            ```json
            {
              "category": "security|quality|performance|tests",
              "severity": "critical|high|medium|low",
              "file": "relative/path/to/file.py",
              "line_start": 42,
              "line_end": 45,
              "issue": "Clear description of the issue",
              "suggestion": "Specific, actionable fix recommendation",
              "confidence": 0.85,
              "actionable": true,
              "fix_type": "optional: ruff_format|ruff_lint_fix or omit"
            }
            ```

            ## Review Focus Areas

            1. **Security**: Vulnerabilities, secrets, injection risks, auth/authz issues, input validation
            2. **Quality**: SOLID violations, code smells, complexity (KISS), maintainability, readability
            3. **Performance**: Algorithmic efficiency, N+1 queries, unnecessary operations, resource usage
            4. **Tests**: Missing coverage, test quality, edge cases, integration test gaps

            ## Severity Guidelines

            - **critical**: Security vulnerabilities, data loss risks, production-breaking bugs
            - **high**: Major design issues, significant performance problems, missing auth checks
            - **medium**: Code quality issues, maintainability concerns, minor performance issues
            - **low**: Style issues, minor improvements, optional optimizations

            ## Confidence Guidelines

            - **0.9-1.0**: Definitely an issue (e.g., SQL injection, hardcoded secrets)
            - **0.7-0.9**: Likely an issue (e.g., complex function, missing tests)
            - **0.5-0.7**: Possible issue (e.g., potential performance bottleneck)
            - **< 0.7**: Filter out (too uncertain)

            ## Output Format

            Write `review-findings.json` with this structure:

            ```json
            {
              "findings": [
                {
                  "category": "security",
                  "severity": "high",
                  "file": "src/auth.py",
                  "line_start": 23,
                  "line_end": 25,
                  "issue": "Hardcoded secret key in source code",
                  "suggestion": "Move secret key to environment variable and load via os.getenv('SECRET_KEY')",
                  "confidence": 0.95,
                  "actionable": true
                }
              ],
              "summary": {
                "total": 1,
                "by_category": {
                  "security": 1,
                  "quality": 0,
                  "performance": 0,
                  "tests": 0
                },
                "models_used": ["gpt-5.2", "gemini-3-pro"],
                "categories_requested": ["security", "quality", "performance", "tests"]
              }
            }
            ```

            ## Critical Requirements

            - Use `mcp__pal__consensus` for multi-model validation
            - Filter findings: confidence >= 0.7 AND actionable = true
            - Deduplicate: Remove findings with same file + line_start + line_end
            - Validate schema: All required fields present, correct types
            - Write to `review-findings.json` in the current directory

            ## Error Handling

            If PAL MCP consensus fails for a file:
            - Log the error to stderr
            - Continue with remaining files (failure isolation)
            - Include successful findings in output

            Begin now. Read scope-selection.json and perform the consensus review.

      - name: Validate review findings output
        id: validate_findings
        if: |
          steps.scope_selector.outputs.skip != 'true' &&
          (steps.consensus_review_bedrock.outcome == 'success' || steps.consensus_review_anthropic.outcome == 'success')
        run: |
          if [[ ! -f "review-findings.json" ]]; then
            echo "::error::review-findings.json was not created by consensus review"
            echo '{"findings": [], "summary": {"total": 0, "by_category": {}}}' > review-findings.json
            echo "findings_created=false" >> $GITHUB_OUTPUT
          else
            # Strict schema validation (validates each finding, outputs sanitized JSON)
            if python scripts/validate_findings_schema.py review-findings.json review-findings-validated.json; then
              mv review-findings-validated.json review-findings.json
              FINDING_COUNT=$(jq '.findings | length' review-findings.json)
              echo "Found $FINDING_COUNT validated findings"
              echo "findings_created=true" >> $GITHUB_OUTPUT
              echo "finding_count=$FINDING_COUNT" >> $GITHUB_OUTPUT
            else
              echo "::error::review-findings.json failed schema validation"
              echo '{"findings": [], "summary": {"total": 0, "by_category": {}}}' > review-findings.json
              echo "findings_created=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload review findings
        if: |
          steps.scope_selector.outputs.skip != 'true' &&
          (steps.consensus_review_bedrock.outcome == 'success' ||
           steps.consensus_review_bedrock.outcome == 'failure' ||
           steps.consensus_review_anthropic.outcome == 'success' ||
           steps.consensus_review_anthropic.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: review-findings
          path: review-findings.json
          retention-days: 30

      - name: Normalize findings
        id: normalize
        if: |
          steps.validate_findings.outputs.findings_created == 'true' &&
          steps.validate_findings.outputs.finding_count != '0'
        run: |
          python scripts/normalize_findings.py \
            --findings review-findings.json \
            --output-dir fix-plans

          # Count findings per category
          for category in security quality performance tests; do
            if [[ -f "fix-plans/${category}.json" ]]; then
              COUNT=$(jq '.findings | length' "fix-plans/${category}.json")
              echo "${category}_count=$COUNT" >> $GITHUB_OUTPUT
            else
              echo "${category}_count=0" >> $GITHUB_OUTPUT
            fi
          done

      - name: Upload fix plans
        if: steps.normalize.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: fix-plans
          path: fix-plans/
          retention-days: 30

      # ========== Phase 2: Autofix Workflow ==========

      - name: Install ruff (for autofix)
        if: |
          steps.normalize.outcome == 'success' &&
          (github.event.inputs.enable_autofix != 'false' || github.event.inputs.enable_autofix == '')
        run: |
          pip install ruff

      - name: Apply autofix with safety checks
        id: autofix
        if: |
          steps.normalize.outcome == 'success' &&
          (github.event.inputs.enable_autofix != 'false' || github.event.inputs.enable_autofix == '')
        run: |
          python scripts/apply_autofix.py \
            --fix-plans-dir fix-plans \
            --output autofix-results.json

          # Check if any files were successfully autofixed
          AUTOFIX_SUCCESS=$(jq '.total_files_succeeded' autofix-results.json)
          echo "autofix_files_succeeded=$AUTOFIX_SUCCESS" >> $GITHUB_OUTPUT

          if [[ $AUTOFIX_SUCCESS -gt 0 ]]; then
            echo "autofix_applied=true" >> $GITHUB_OUTPUT
          else
            echo "autofix_applied=false" >> $GITHUB_OUTPUT
          fi
        # Autofix is best-effort -- failure falls back to suggestion-only PR
        continue-on-error: true

      - name: Upload autofix results
        if: steps.autofix.outcome == 'success' || steps.autofix.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: autofix-results
          path: autofix-results.json
          retention-days: 30

      - name: Run CI validation (ruff check)
        id: ci_ruff
        if: steps.autofix.outputs.autofix_applied == 'true'
        run: |
          # Read-only validation -- no --fix to ensure we validate the exact state
          # produced by apply_autofix.py (using --fix here would mask idempotency failures)
          ruff check src/
          RUFF_EXIT=$?

          if [[ $RUFF_EXIT -eq 0 ]]; then
            echo "ci_ruff_passed=true" >> $GITHUB_OUTPUT
            echo "Ruff check passed"
          else
            echo "ci_ruff_passed=false" >> $GITHUB_OUTPUT
            echo "Ruff check failed"
            exit 1
          fi
        # CI validation failure triggers rollback in the ci_gate step, not a workflow abort
        continue-on-error: true

      - name: Run CI validation (pytest)
        id: ci_tests
        # Runs independently of ruff -- both inform the CI gate
        if: steps.autofix.outputs.autofix_applied == 'true'
        run: |
          # Run tests if they exist
          if [[ -d "tests" ]]; then
            pytest tests/ -v --tb=short || {
              echo "ci_tests_passed=false" >> $GITHUB_OUTPUT
              echo "Tests failed"
              exit 1
            }
            echo "ci_tests_passed=true" >> $GITHUB_OUTPUT
            echo "Tests passed"
          else
            echo "ci_tests_passed=true" >> $GITHUB_OUTPUT
            echo "No tests directory found - skipping"
          fi
        # CI validation failure triggers rollback in the ci_gate step, not a workflow abort
        continue-on-error: true

      - name: CI validation summary
        id: ci_gate
        if: steps.autofix.outputs.autofix_applied == 'true'
        run: |
          RUFF_PASSED="${{ steps.ci_ruff.outputs.ci_ruff_passed }}"
          TESTS_PASSED="${{ steps.ci_tests.outputs.ci_tests_passed }}"

          if [[ "$RUFF_PASSED" == "true" ]] && [[ "$TESTS_PASSED" == "true" ]]; then
            echo "ci_passed=true" >> $GITHUB_OUTPUT
            echo "✅ All CI checks passed - autofix PR will be created"
          else
            echo "ci_passed=false" >> $GITHUB_OUTPUT
            echo "❌ CI checks failed - will fallback to suggestion-only PR"

            # Rollback autofix changes
            git checkout .
            git clean -fd
          fi

      - name: Generate autofix PR content
        id: autofix_pr_content
        if: |
          steps.autofix.outputs.autofix_applied == 'true' &&
          steps.ci_gate.outputs.ci_passed == 'true'
        run: |
          python scripts/generate_autofix_pr_content.py \
            --fix-plans-dir fix-plans \
            --autofix-results autofix-results.json \
            --output-dir pr-content-autofix

      - name: Upload autofix PR content
        if: steps.autofix_pr_content.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: pr-content-autofix
          path: pr-content-autofix/
          retention-days: 30

      - name: Create/update autofix PRs
        id: create_autofix_prs
        if: |
          steps.autofix_pr_content.outcome == 'success' &&
          github.event.inputs.dry_run != 'true'
        run: |
          python scripts/create_prs.py \
            --pr-content-dir pr-content-autofix \
            --max-prs "${{ env.MAX_PRS_PER_RUN }}" \
            --stale-days "${{ env.PR_STALE_DAYS }}" \
            --autofix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== Phase 3: LLM-Generated Fixes ==========
      # Conservative scope: single-file fixes for unused vars, dead code,
      # type annotations, docstrings. One PR per finding for easy review.

      - name: Classify LLM-fixable findings
        id: classify_llm
        if: steps.normalize.outcome == 'success'
        run: |
          MAX_LLM_FIXES="${{ github.event.inputs.max_llm_fixes || 5 }}"

          python scripts/classify_llm_fixable.py \
            --fix-plans-dir fix-plans \
            --output llm-fixable-findings.json \
            --max-fixes "$MAX_LLM_FIXES"

          EXIT_CODE=$?
          if [[ $EXIT_CODE -eq 0 ]]; then
            LLM_COUNT=$(jq '.selected' llm-fixable-findings.json)
            echo "llm_fixable_count=$LLM_COUNT" >> $GITHUB_OUTPUT
            echo "has_llm_fixes=true" >> $GITHUB_OUTPUT
            echo "Found $LLM_COUNT findings eligible for LLM fix"
          else
            echo "has_llm_fixes=false" >> $GITHUB_OUTPUT
            echo "llm_fixable_count=0" >> $GITHUB_OUTPUT
            echo "No findings eligible for LLM fix"
          fi
        continue-on-error: true

      - name: Generate LLM fixes (Claude Code Action)
        id: llm_fixes
        if: |
          steps.classify_llm.outputs.has_llm_fixes == 'true' &&
          github.event.inputs.dry_run != 'true' &&
          (steps.check_providers.outputs.bedrock_available == 'true' || steps.check_providers.outputs.anthropic_available == 'true')
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: ${{ steps.check_providers.outputs.bedrock_available }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          max_turns: 30
          prompt: |
            # Phase 3: Generate LLM Fixes — One PR Per Finding

            You are generating conservative, single-file code fixes for review findings
            identified by the nightly code review. Each fix becomes a separate PR.

            ## Instructions

            1. **Read `llm-fixable-findings.json`** — contains the findings to fix
            2. **For EACH finding**, do the following:
               a. Create a new branch: `fix/nightly-llm-{date}-{index}` (e.g., `fix/nightly-llm-2026-03-13-1`)
               b. Read the affected file
               c. Apply the fix described in the finding's `suggestion` field
               d. Run `ruff format` on the changed file
               e. Run `ruff check` on the changed file (fix any issues)
               f. Run `python -m py_compile <file>` to verify syntax
               g. If any validation fails, abandon this finding and move to the next
               h. Commit with message: `fix: {issue summary} ({file})`
               i. Push the branch
               j. Create a PR with the finding details

            ## Safety Rules (CRITICAL)

            - **Single file only**: Each fix must touch exactly ONE file
            - **Conservative changes**: Only fix what the finding describes
            - **No new features**: Do not add functionality beyond the fix
            - **No refactors**: Do not restructure code beyond the specific fix
            - **Preserve behavior**: The fix must not change runtime behavior (except removing dead code)
            - **Validate before commit**: ruff format + ruff check + py_compile must all pass

            ## PR Format

            For each PR, use this format:

            ```
            Title: fix(nightly): {short issue description}

            Body:
            ## Nightly Review — LLM Fix

            **Finding**: {issue}
            **File**: {file}:{line_start}-{line_end}
            **Severity**: {severity} | **Confidence**: {confidence}
            **Category**: {category}

            ### Change
            {brief description of what was changed and why}

            ### Validation
            - [x] ruff format — passed
            - [x] ruff check — passed
            - [x] py_compile — passed

            ---
            *Auto-generated by Nightly Code Review (Phase 3: LLM Fixes)*
            *This PR requires human review before merging.*

            Labels: nightly-review-llm-fix
            ```

            ## Finding Schema

            Each finding in `llm-fixable-findings.json` has:
            - `file`: relative path to the file
            - `line_start`, `line_end`: affected line range
            - `issue`: description of the problem
            - `suggestion`: recommended fix
            - `severity`: critical/high/medium/low
            - `confidence`: 0.0-1.0
            - `category`: quality/performance

            ## Error Handling

            - If a fix fails validation, skip it and continue to the next finding
            - Log skipped findings to stderr
            - Write a summary of created PRs to `llm-fix-results.json`

            Begin now. Read llm-fixable-findings.json and process each finding.

          claude_args: >-
            --allowed-tools
            "Write,Read,Edit,Bash(git *),Bash(gh pr create *),Bash(ruff *),Bash(python -m py_compile *),Bash(pip install *)"
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          CLAUDE_CODE_USE_BEDROCK: ${{ steps.check_providers.outputs.bedrock_available == 'true' && '1' || '' }}

      - name: Upload LLM fix results
        if: steps.llm_fixes.outcome == 'success' || steps.llm_fixes.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: llm-fix-results
          path: |
            llm-fixable-findings.json
            llm-fix-results.json
          retention-days: 30
          if-no-files-found: ignore

      # ========== Phase 1: Suggestion-only PRs ==========

      - name: Generate suggestions
        id: suggestions
        if: steps.normalize.outcome == 'success'
        run: |
          python scripts/generate_suggestions.py \
            --fix-plans-dir fix-plans \
            --output-dir pr-content

      - name: Upload PR content
        if: steps.suggestions.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: pr-content
          path: pr-content/
          retention-days: 30

      - name: Create/update PRs
        id: create_prs
        if: |
          steps.suggestions.outcome == 'success' &&
          github.event.inputs.dry_run != 'true'
        run: |
          python scripts/create_prs.py \
            --pr-content-dir pr-content \
            --max-prs "${{ env.MAX_PRS_PER_RUN }}" \
            --stale-days "${{ env.PR_STALE_DAYS }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup stale PRs
        if: |
          always() &&
          github.event.inputs.dry_run != 'true'
        run: |
          # Close stale nightly-review PRs (>7 days old with no activity)
          gh pr list \
            --label "nightly-review" \
            --state open \
            --json number,updatedAt \
            --jq '.[] | select((now - (.updatedAt | fromdateiso8601)) > (7 * 86400)) | .number' \
            | xargs -I {} gh pr close {} --comment "Closing stale nightly review PR (>7 days old)"

          # Close stale autofix PRs (Phase 2)
          gh pr list \
            --label "nightly-review-autofix" \
            --state open \
            --json number,updatedAt \
            --jq '.[] | select((now - (.updatedAt | fromdateiso8601)) > (7 * 86400)) | .number' \
            | xargs -I {} gh pr close {} --comment "Closing stale autofix PR (>7 days old)"

          # Close stale LLM fix PRs (Phase 3)
          gh pr list \
            --label "nightly-review-llm-fix" \
            --state open \
            --json number,updatedAt \
            --jq '.[] | select((now - (.updatedAt | fromdateiso8601)) > (7 * 86400)) | .number' \
            | xargs -I {} gh pr close {} --comment "Closing stale LLM fix PR (>7 days old)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow summary
        if: always()
        run: |
          echo "## Nightly Code Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Skip reasons
          if [[ "${{ steps.check_changes.outputs.skip }}" == "true" ]]; then
            echo "**Status**: Skipped - ${{ steps.check_changes.outputs.reason }}" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [[ "${{ steps.scope_selector.outputs.skip }}" == "true" ]]; then
            echo "**Status**: Skipped - No files to review" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Scope selection
          echo "### Scope Selection" >> $GITHUB_STEP_SUMMARY
          echo "- **Scope**: ${{ steps.scope.outputs.scope }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files Scanned**: ${{ steps.scope_selector.outputs.file_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Review status
          echo "### Review Status" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.consensus_review_bedrock.outcome }}" == "success" ]]; then
            echo "- **Provider**: AWS Bedrock ✅" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.consensus_review_anthropic.outcome }}" == "success" ]]; then
            echo "- **Provider**: Anthropic API ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Provider**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Models**: ${{ github.event.inputs.models || 'gpt-5.2,gemini-3-pro' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Categories**: ${{ github.event.inputs.categories || 'security,quality,performance,tests' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Findings**: ${{ steps.validate_findings.outputs.finding_count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Findings by category
          echo "### Findings by Category" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ steps.normalize.outputs.security_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ steps.normalize.outputs.quality_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ steps.normalize.outputs.performance_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.normalize.outputs.tests_count || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Phase 2: Autofix status
          if [[ "${{ steps.autofix.outputs.autofix_applied }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Phase 2: Autofix Status" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Files Autofixed | ${{ steps.autofix.outputs.autofix_files_succeeded || 0 }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Ruff Check | ${{ steps.ci_ruff.outputs.ci_ruff_passed == 'true' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Tests | ${{ steps.ci_tests.outputs.ci_tests_passed == 'true' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| CI Gate | ${{ steps.ci_gate.outputs.ci_passed == 'true' && '✅ Passed' || '❌ Failed - rolled back' }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [[ "${{ steps.ci_gate.outputs.ci_passed }}" == "true" ]]; then
              echo "**Autofix PR Created**: Yes (see Create/update autofix PRs step)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Autofix PR Created**: No (CI failed, reverted to suggestion-only)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Phase 3: LLM Fix status
          LLM_COUNT="${{ steps.classify_llm.outputs.llm_fixable_count || 0 }}"
          if [[ "$LLM_COUNT" != "0" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Phase 3: LLM Fix Status" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Findings Classified | $LLM_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Claude Code Action | ${{ steps.llm_fixes.outcome || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # PR status
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "**Mode**: Dry run (no PRs created)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**PRs Created/Updated**: Check 'Create/update PRs' step for details" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Powered by PAL MCP Multi-Model Consensus*" >> $GITHUB_STEP_SUMMARY
          echo "*Phase 3: Deterministic autofix + LLM-generated fixes*" >> $GITHUB_STEP_SUMMARY
