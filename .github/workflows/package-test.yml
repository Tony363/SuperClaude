# Cross-platform Python package test matrix
# Imported from Ocelot's agentic-context-engine, adapted for SuperClaude.
# Activate by updating triggers and paths when a publishable package exists.
name: Package Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/scripts/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/scripts/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest -m "not requires_api"

    - name: Upload coverage reports (Linux only)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 7

    - name: Check code formatting (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run ruff format --check .

    - name: Lint check (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run ruff check .

    - name: Type checking (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run mypy . --ignore-missing-imports
