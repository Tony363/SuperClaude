# Cross-platform Python package test matrix
# Imported from Ocelot's agentic-context-engine, adapted for SuperClaude.
# Activate by updating triggers and paths when a publishable package exists.
name: Package Tests

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_package: ${{ steps.check.outputs.has_package }}
    steps:
    - uses: actions/checkout@v6
    - name: Check for pyproject.toml
      id: check
      run: |
        if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
          echo "has_package=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_package=false" >> "$GITHUB_OUTPUT"
          echo "No package config found — skipping tests"
        fi

  test:
    needs: preflight
    if: needs.preflight.outputs.has_package == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync --extra test

    - name: Run tests
      run: uv run pytest -m "not requires_api"

    - name: Upload coverage reports (Linux only)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 7

    - name: Check code formatting (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run ruff format --check .

    - name: Lint check (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run ruff check .

    - name: Type checking (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: uv run mypy . --ignore-missing-imports
