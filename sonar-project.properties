sonar.projectKey=tony363_superclaude
sonar.organization=tony363
sonar.projectName=SuperClaude

sonar.sources=SuperClaude,core
sonar.tests=tests
sonar.python.version=3.10
sonar.sourceEncoding=UTF-8

sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/.venv/**,\
  **/venv/**,\
  **/node_modules/**,\
  **/crates/**,\
  **/scripts/**,\
  **/benchmarks/**,\
  **/agents/**,\
  **/commands/**,\
  **/config/**,\
  **/artifacts/**

sonar.test.exclusions=tests/**/*

# Coverage and external analyzer reports
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.bandit.reportPaths=bandit-report.json
sonar.python.ruff.reportPaths=ruff-report.json

sonar.scm.provider=git
sonar.pullrequest.github.repository=Tony363/SuperClaude
